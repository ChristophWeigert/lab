---
services:
  broker:
    image: docker.io/library/redis:8.6.2@sha256:832d7785830f3f4b559300e6191fc914b15642c1935252338825cf4332200148
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redisdata:/data

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:dev@sha256:c700d20d0548627a5b16c4814d5e3bafe9749ab5ca100f265d40c48c679523be
    restart: unless-stopped
    container_name: "webserver"
    depends_on:
      - broker
      - gotenberg
      - tika
    networks:
      - internal
      - proxy
    volumes:
      - data:/usr/src/paperless/data
      - media:/usr/src/paperless/media
      - export:/usr/src/paperless/export
      - consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBENGINE: sqlite
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      PAPERLESS_URL: https://$DOMAIN
      PAPERLESS_SECRET_KEY: $PAPERLESS_SECRET_KEY
      PAPERLESS_TIME_ZONE: Europe/Berlin
      PAPERLESS_OCR_LANGUAGES: deu
      PAPERLESS_OCR_LANGUAGE: deu
      PAPERLESS_OCR_ROTATE_PAGES: true
      PAPERLESS_CONSUMER_ENABLE_BARCODES: true
      PAPERLESS_CONSUMER_ENABLE_ASN_BARCODE: true
      PAPERLESS_CONSUMER_BARCODE_SCANNER: ZXING
      PAPERLESS_CONSUMER_DELETE_DUPLICATES: true
      PAPERLESS_CONSUMER_POLLING: 15
      PAPERLESS_CONSUMER_BARCODE_UPSCALE: 1.75
      PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
      PAPERLESS_SOCIALACCOUNT_PROVIDERS: $PAPERLESS_SOCIALACCOUNT_PROVIDERS
      PAPERLESS_ALLOWED_HOSTS: $PAPERLESS_ALLOWED_HOSTS
      PAPERLESS_CSRF_TRUSTED_ORIGINS: $PAPERLESS_CSRF_TRUSTED_ORIGINS
      PAPERLESS_FILENAME_FORMAT_REMOVE_NONE: $PAPERLESS_FILENAME_FORMAT_REMOVE_NONE
      PAPERLESS_ENABLE_FLOWER: true
    labels:
      traefik.enable: "true"
      traefik.http.routers.paperless-ngx.entrypoints: "websecure"
      traefik.http.routers.paperless-ngx.rule: "Host(`paperless-ngx.$DOMAIN`)"
      traefik.http.routers.paperless-ngx.tls: "true"
      traefik.http.routers.paperless-ngx.tls.certresolver: "production"
      traefik.http.routers.paperless-ngx.tls.domains[0].main: "$DOMAIN"
      traefik.http.routers.paperless-ngx.tls.domains[0].sans: "*.$DOMAIN"
      traefik.docker.network: "proxy"
      homepage.name: paperless-ngx
      homepage.group: Services
      homepage.icon: paperless-ngx
      homepage.href: https://paperless-ngx.$DOMAIN
      homepage.description: paperless-ngx
      homepage.widget.type: paperlessngx
      homepage.widget.url: https://paperless-ngx.$DOMAIN
      homepage.widget.username: $HOMEPAGE_USERNAME
      homepage.widget.password: $HOMEPAGE_PASSWORD

  paperless-ai:
    image: clusterzx/paperless-ai:3.0.9@sha256:2b65888163fd59716f1c8285b31c5bd0b30c9c3c192c42b516688e3887d4ba60
    container_name: paperless-ai
    networks:
      - internal
      - proxy
    restart: unless-stopped
    depends_on:
      - webserver
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges=true
    environment:
      - PUID=1000
      - PGID=1000
      - PAPERLESS_AI_PORT=3000
    volumes:
      - data_ai:/app/data
    labels:
      traefik.enable: "true"
      traefik.http.routers.paperless-ai.entrypoints: "websecure"
      traefik.http.routers.paperless-ai.rule: "Host(`paperless-ai.$DOMAIN`)"
      traefik.http.routers.paperless-ai.tls: "true"
      traefik.http.routers.paperless-ai.tls.certresolver: "production"
      traefik.http.routers.paperless-ai.tls.domains[0].main: "$DOMAIN"
      traefik.http.routers.paperless-ai.tls.domains[0].sans: "*.$DOMAIN"
      traefik.docker.network: "proxy"

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.31.0@sha256:f0d86e8a1dbc7b33a5a65cb251d02bb271a48ffa989da3feb5ed7d954fe4d4b3
    restart: unless-stopped
    networks:
      - internal
    # The gotenberg chromium route is used to convert .eml files. We do not
    # want to allow external content like tracking pixels or even javascript.
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  tika:
    image: apache/tika:3.3.0.0-full@sha256:ecdd37e204308266b1f8e28569f8516ebd5b96d7a4518a71d3904710b20c03b3
    restart: unless-stopped
    networks:
      - internal

volumes:
  data:
  data_ai:
  media:
  redisdata:
  export:
    driver_opts:
      type: "nfs"
      o: "nfsvers=4,addr=192.168.1.14,rw"
      device: ":/mnt/pool-main/docker_volumes/paperless_export"
  consume:
    driver_opts:
      type: "nfs"
      o: "nfsvers=4,addr=192.168.1.14,rw"
      device: ":/mnt/pool-main/docker_volumes/paperless_consume"

networks:
  internal:
  proxy:
    external: true
    
    
    