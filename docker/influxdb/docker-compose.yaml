---
# (Optional) when using custom network
networks:
  proxy:
    external: true

volumes:
  influxdb:
  grafana:

services:
  influxdb:
    container_name: influxdb
    image: docker.io/library/influxdb:2.9.1-alpine@sha256:1cb8fa92ff9d13518d8198dae872b7ea523757a03c655d12a67175b1ab7a72f0
    volumes:
      - influxdb:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    labels:
      traefik.enable: "true"
      traefik.http.routers.influxdb.entrypoints: "websecure"
      traefik.http.routers.influxdb.rule: "Host(`influxdb.$DOMAIN`)"
      traefik.http.routers.influxdb.tls: "true"
      traefik.http.routers.influxdb.tls.certresolver: "production"
      traefik.http.routers.influxdb.tls.domains[0].main: "$DOMAIN"
      traefik.http.routers.influxdb.tls.domains[0].sans: "*.$DOMAIN"
      traefik.docker.network: "proxy"
    networks:
      - proxy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    volumes:
      - grafana:/var/lib/grafana
      - /mnt/grafana-provisioning/:/etc/grafana/provisioning/
    depends_on:
      - influxdb
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    networks:
      - proxy
    labels:
      traefik.enable: "true"
      traefik.http.routers.grafana.entrypoints: "websecure"
      traefik.http.routers.grafana.rule: "Host(`grafana.$DOMAIN`)"
      traefik.http.routers.grafana.tls: "true"
      traefik.http.routers.grafana.tls.certresolver: "production"
      traefik.http.routers.grafana.tls.domains[0].main: "$DOMAIN"
      traefik.http.routers.grafana.tls.domains[0].sans: "*.$DOMAIN"
      traefik.docker.network: "proxy"